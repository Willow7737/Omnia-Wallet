<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Omnia Wallet — self-custodial UBC wallet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E1F22"/>
      <stop offset="1" stop-color="#2B2D31"/>
    </linearGradient>
    <linearGradient id="blurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5865F2"/>
      <stop offset="1" stop-color="#4048C9"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5865F2" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#5865F2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <!-- dot texture -->
  <g fill="#5865F2" fill-opacity="0.06">
    <circle cx="60" cy="60" r="2"/><circle cx="140" cy="60" r="2"/><circle cx="220" cy="60" r="2"/>
    <circle cx="900" cy="440" r="2"/><circle cx="820" cy="440" r="2"/><circle cx="980" cy="440" r="2"/>
    <circle cx="960" cy="90" r="2"/><circle cx="900" cy="140" r="2"/>
  </g>
  <circle cx="770" cy="250" r="300" fill="url(#glow)"/>

  <!-- Logo mark: a self-custody "shield ring" with an O core -->
  <g transform="translate(150 250)">
    <circle r="118" fill="none" stroke="url(#blurple)" stroke-width="16"/>
    <circle r="118" fill="none" stroke="#5865F2" stroke-width="16" stroke-opacity="0.25" stroke-dasharray="10 24"/>
    <circle r="70" fill="url(#blurple)"/>
    <!-- key notch cut in the core, hinting self-custody -->
    <circle r="26" fill="#1E1F22"/>
    <rect x="-9" y="18" width="18" height="52" rx="6" fill="#1E1F22"/>
  </g>

  <!-- Wordmark + tagline -->
  <g font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
    <text x="330" y="238" fill="#F9F9FA" font-size="92" font-weight="800" letter-spacing="-2">Omnia</text>
    <text x="330" y="322" fill="#5865F2" font-size="92" font-weight="800" letter-spacing="-2">Wallet</text>
    <text x="334" y="372" fill="#B5BAC1" font-size="27" font-weight="500" letter-spacing="0.3">Self-custodial UBC wallet — your keys, your control.</text>
  </g>
</svg>
