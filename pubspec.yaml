name: omnia_wallet
description: "Omnia Protocol mobile wallet — self-custodial UBC wallet."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  dio: ^5.7.0

  # Cryptography — Ed25519 keygen/sign (interops with the node's ed25519-dalek)
  ed25519_edwards: ^0.3.1
  # BIP39 mnemonic backup/recovery (seed -> Ed25519 key)
  bip39: ^1.0.6
  # SHA-256 for deterministic DID derivation (must match the node's rule)
  crypto: ^3.0.3
  convert: ^3.1.1

  # Secure key storage (Keychain / Keystore)
  flutter_secure_storage: ^9.2.2
  # Biometric / device-credential gate before signing
  local_auth: ^2.3.0

  # QR: show own DID, scan recipient DID
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Navigation
  go_router: ^14.2.7

  # Mode B sign-in: existing Omnia accounts (Google / GitHub / email) from
  # the web app; a node JWT is minted by the mint-node-jwt edge function.
  supabase_flutter: ^2.8.0

  # Vector brand art & illustrations
  flutter_svg: ^2.0.17

  # Attach images to news replies; pick a profile photo
  image_picker: ^1.1.2
  path_provider: ^2.1.4

  # Formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/logo/
    - assets/illustrations/
    - assets/brand_icons/
    - assets/onboarding/

  # Inter — the workhorse product-UI face (see CREDITS.md).
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
