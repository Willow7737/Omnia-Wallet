name: Release AAB

# Builds a Play-Store-ready Android App Bundle, signed with the upload key.
#
# Trigger: push a tag like `v0.1.0`, or run manually from the Actions tab.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64  — base64 of your upload-keystore.jks
#                              (`base64 -w0 upload-keystore.jks` on Linux,
#                               `base64 -i upload-keystore.jks` on macOS)
#   ANDROID_KEYSTORE_PASSWORD — store password
#   ANDROID_KEY_PASSWORD      — key password
#   ANDROID_KEY_ALIAS         — key alias (e.g. `upload`)
#
# The resulting app-release.aab is uploaded as a build artifact; download it
# and upload to the Play Console (or wire up fastlane/`r0adkll/upload-google-play`
# later for automated publishing). See RELEASE.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-aab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set — cannot produce a publishable AAB."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks

      - name: Write key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=app/upload-keystore.jks
          EOF

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: omnia-wallet-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Clean up signing material
        if: always()
        run: rm -f android/app/upload-keystore.jks android/key.properties
